<!DOCTYPE html>
<html>
<head>
    <title>Spam Detector</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin-top: 50px;
        }

        textarea {
            width: 400px;
            height: 120px;
            font-size: 16px;
        }

        button {
            padding: 10px 20px;
            margin-top: 10px;
            cursor: pointer;
        }

        #result {
            margin-top: 20px;
            font-size: 24px;
            font-weight: bold;
        }

        .spam {
            color: red;
        }

        .ham {
            color: green;
        }
    </style>
</head>

<body>

    <h1>Détecteur de Spam</h1>

    <textarea id="text" placeholder="Écris ton message ici..."></textarea>
    <br>

    <button onclick="checkSpam()">Tester</button>

    <div id="result"></div>

   <script>
        async function checkSpam() {
            const text = document.getElementById("text").value;
            const resultDiv = document.getElementById("result");

            resultDiv.innerText = "Analyse en cours...";

            try {
                const response = await fetch("/predict/", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ text: text })
                });

                const data = await response.json();

                let label = data.result.toUpperCase();
                let confidence = data.confidence;

                if (data.result === "spam") {
                    resultDiv.innerHTML =
                        "SPAM (" + confidence + "%)";
                    resultDiv.className = "spam";
                } else {
                    resultDiv.innerHTML =
                        "NON SPAM (" + confidence + "%)";
                    resultDiv.className = "ham";
                }

            } catch (error) {
                resultDiv.innerText = "Erreur serveur";
                resultDiv.className = "spam";
            }
        }
  </script>

</body>
</html>
